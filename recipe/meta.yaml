{% set name = "LFPykit" %}
{% set version = "0.6.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | lower }}-{{ version }}.tar.gz
  sha256: 14420786778039872ec2dc47af9adf4ea449bd6d80094acf966c1653814b02ef

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
  host:
    - python {{ python_min }}
    - pip
    - wheel
    - poetry
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - meautility

test:
  requires:
    - pytest
    - neuron  # [not win]
    - h5py
    - sympy
    - python {{ python_min }}
  imports:
    - lfpykit
    - lfpykit.tests
  commands:
    - py.test -vsx --pyargs lfpykit

about:
  home: https://github.com/LFPy/LFPykit
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: Electrostatic forward models for multicompartment neuron models
  description: |
    LFPykit is a collection of freestanding electrostatic forward models
    facilitating predictions of extracellular potentials, magnetic fields
    and related measurements of neural activity from multicompartment neuron
    models.
  doc_url: https://lfpykit.readthedocs.io/
  dev_url: https://github.com/LFPy/LFPykit

extra:
  recipe-maintainers:
    - espenhgn
